<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Firebase Basics</title>
  <link rel="icon" type="image/x-icon" href="assets/images/dtec_favicon.png">

  <link href="style.css" rel="stylesheet" type="text/css" />

  <!-- firebase start ****************************************-->
  <!-- Firebase App (core Firebase SDK) is always required & must be listed 1st -->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
  <!-- Add Firebase products that you want to use -->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
  <!-- firebase end ******************************************-->
  <script src="fb_setup.js"></script>
  <script src="script.js"></script>

</head>

    <div id = "returnHomeButton">
        <button onclick="location.href='index.html'">Return</button>
    </div>

    
    <div class="container">
      <div id="logInButton">
        <button onclick='fb_popupLogin()'>Log In with Google</button>
    </div>
    <form id="userForm" onsubmit="return false;">
      <label for="name">Username:</label>
      <input type="text" id="name" name="name" maxlength = "15" required />

      <label for="age">Age:</label>
      <input type="number" id="age" name="age" maxlength = "2" required />

      <button onclick="fb_write()">Submit</button>

    </form>
    <p id="statusMessage"></p>
    </div>
    

</html>
